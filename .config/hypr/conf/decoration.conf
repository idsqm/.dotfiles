
general {
    gaps_in = 6
    gaps_out = 20

    border_size = 2 

    col.active_border = rgba(53bdfaaa)
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle 
}

debug {
    disable_logs = false
}

decoration {
    rounding = 12 
    rounding_power = 3 

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 6
        render_power = 4
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}
